services:
  - type: web
    name: doctracker-backend
    runtime: docker
    plan: free
    healthCheckPath: /v3/api-docs
    envVars:
      - fromGroup: doctracker
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: APP_WHATSAPP_ENABLED
        value: "false"
