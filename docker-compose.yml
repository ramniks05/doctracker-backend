services:
  postgres:
    image: postgres:16
    container_name: docutrack-postgres
    environment:
      POSTGRES_DB: docutrack
      POSTGRES_USER: docutrack
      POSTGRES_PASSWORD: docutrack
    ports:
      - "5432:5432"
    volumes:
      - docutrack_pgdata:/var/lib/postgresql/data

volumes:
  docutrack_pgdata:

